name: Build Android APK

# Builds an installable debug APK in the cloud (free) and uploads it as a
# downloadable artifact. Run automatically on pushes that touch the frontend,
# or manually from the Actions tab (Run workflow).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to publish the Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web bundle + sync Capacitor
        working-directory: frontend
        run: |
          npm ci
          npm run build:app
          npx cap sync android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Assemble debug APK
        working-directory: frontend/android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk HD-Systems.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HD-Systems-debug-apk
          path: HD-Systems.apk
          if-no-files-found: error

      - name: Publish to a GitHub Release (permanent download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: HD Systems — Android (latest)
          body: |
            Latest installable Android build of HD Systems (debug APK).
            Download **HD-Systems.apk** below, copy it to an Android phone, and tap to install
            (allow "install from unknown sources"). Rebuilt automatically on every frontend update.
          files: HD-Systems.apk
          prerelease: true
