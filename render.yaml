services:
  # ── Flask API ──────────────────────────────────────────────────────────────
  - type: web
    name: ai-hds-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false   # set after frontend is deployed: https://<your-frontend>.onrender.com
      - key: OPENAI_API_KEY
        sync: false   # optional — leave blank to use mock model
      - key: DATABASE_URL
        value: sqlite:///instance/ai_hds.db

  # ── React Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: ai-hds-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://ai-hds-api.onrender.com after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
